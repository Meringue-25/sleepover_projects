<!DOCTYPE html>
<html>
    <head>
        <title>Tic Tac Toe</title>
        <link rel="stylesheet" href=""tictactoe.css">
    </head>

    <body>
        <h1>Tic Tac Toe</h1>
        <hr>
        <br>
        <div id="board">
                <div data-cell-index="0" class="board-cube">o</div>
                <div data-cell-index="1" class="board-cube">x</div>
                <div data-cell-index="2" class="board-cube">o</div>
                <div data-cell-index="3" class="board-cube">x</div>
                <div data-cell-index="4" class="board-cube">x</div>
                <div data-cell-index="5" class="board-cube">o</div>
                <div data-cell-index="6" class="board-cube">o</div>
                <div data-cell-index="7" class="board-cube">x</div>
                <div data-cell-index="8" class="board-cube">x</div>
        </div>
        <button id="game-restart-button">Restart</button>
        <script src="tictactoe.js"></script>
    </body>
</html>
